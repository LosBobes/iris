<!doctype html>
<html lang="sr-Latn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iris</title>
    <script>
      // Pre-paint theme application to avoid a flash of the wrong palette.
      // Mirrors src/lib/theme.ts (kept in sync intentionally).
      (function () {
        try {
          var pref = localStorage.getItem("iris-theme") || "system";
          var dark =
            pref === "dark" ||
            (pref === "system" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
          document.documentElement.style.colorScheme = dark ? "dark" : "light";
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
