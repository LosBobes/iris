openapi: 3.1.0
info:
  title: Iris Operations API
  version: 0.3.0
  description: |
    Shared HTTP API for Iris work-order operations. Production runtime persists
    data in SQLite, while fixture-backed data remains available for development
    and automated tests.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Auth
  - name: Customers
  - name: Work Orders
paths:
  /healthz:
    get:
      tags: [System]
      summary: Return backend readiness status
      operationId: healthz
      responses:
        '200':
          description: Backend is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a desktop user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/session:
    get:
      tags: [Auth]
      summary: Return the current cookie-backed session
      operationId: getCurrentSession
      responses:
        '200':
          description: Current session result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Clear the current session
      operationId: logout
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
  /customers:
    get:
      tags: [Customers]
      summary: Return a paginated, optionally searched page of customers
      operationId: listCustomers
      parameters:
        - name: q
          in: query
          description: Case-insensitive search over name, PIB and MB.
          schema:
            type: string
        - name: limit
          in: query
          description: Page size. Omit or <= 0 to return all matches.
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: A page of customers plus the total match count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerListResponse'
  /customers/{id}:
    get:
      tags: [Customers]
      summary: Return a single customer by id
      operationId: getCustomer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /locations:
    get:
      tags: [Customers]
      summary: Return normalized customer locations
      operationId: listLocations
      parameters:
        - name: customerId
          in: query
          description: >-
            When set, only the locations belonging to this customer are
            returned. Omit to return every location for the tenant.
          schema:
            type: string
      responses:
        '200':
          description: Customer location records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
  /catalog-items:
    get:
      tags: [Catalog]
      summary: List admin-managed catalog articles and services
      operationId: listCatalogItems
      parameters:
        - name: kind
          in: query
          schema:
            type: string
            enum: [service, article]
        - name: q
          in: query
          description: Case-insensitive search over name and code.
          schema:
            type: string
        - name: active
          in: query
          description: When 'true', only active items are returned.
          schema:
            type: string
            enum: ['true']
        - name: limit
          in: query
          description: Page size. Omit or <= 0 to return all matches.
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: A page of catalog items plus the total match count
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItemListResponse'
    post:
      tags: [Catalog]
      summary: Create a catalog item (admin only)
      operationId: createCatalogItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogItemInput'
      responses:
        '201':
          description: Created catalog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '403':
          description: Caller is not an administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid catalog item input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog-items/{id}:
    get:
      tags: [Catalog]
      summary: Return a single catalog item by id
      operationId: getCatalogItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: The catalog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '404':
          description: Catalog item not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags: [Catalog]
      summary: Update a catalog item
      description: >
        Admins update every field. Operators (non-admin) may change only the
        item's kind (vrsta); all other fields in the payload are ignored and the
        stored values are preserved. Operators cannot create items.
      operationId: updateCatalogItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogItemInput'
      responses:
        '200':
          description: Updated catalog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItem'
        '403':
          description: Operator attempted to create a catalog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Catalog]
      summary: Delete a catalog item (admin only)
      operationId: deleteCatalogItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '403':
          description: Caller is not an administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /catalog-items/{id}/cost-history:
    get:
      tags: [Catalog]
      summary: Return a catalog item's effective-dated cost history (admin only)
      operationId: getCatalogItemCostHistory
      description: >-
        Lists the item's cost records newest period first. The store appends a
        record whenever an admin changes the item's price, so work orders can
        snapshot the cost in effect on their issue/completion date.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cost history records
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CatalogItemCost'
        '403':
          description: Caller is not an administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /settings:
    get:
      tags: [Settings]
      summary: Return shop-wide organization settings (firm name, PDF sections)
      operationId: getSettings
      responses:
        '200':
          description: The organization settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSettings'
    put:
      tags: [Settings]
      summary: Update organization settings (admin only)
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationSettingsUpdate'
      responses:
        '200':
          description: Updated organization settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationSettings'
        '403':
          description: Caller is not an administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid settings input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users:
    get:
      tags: [Users]
      summary: List user accounts (admin only)
      operationId: listUsers
      responses:
        '200':
          description: All accounts (id, username, role); never the password
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '403':
          description: Caller is not an administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags: [Users]
      summary: Create a user account (admin only)
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserInput'
      responses:
        '201':
          description: The created account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '422':
          description: Invalid input or duplicate username
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /users/{id}:
    put:
      tags: [Users]
      summary: Update a user's role and optionally reset their password (admin only)
      operationId: updateUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserInput'
      responses:
        '200':
          description: The updated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid input or last-admin guard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Users]
      summary: Delete a user account (admin only)
      operationId: deleteUser
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '422':
          description: Cannot delete yourself or the last administrator
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /work-orders:
    get:
      tags: [Work Orders]
      summary: Return filtered and paginated work orders
      operationId: listWorkOrders
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [new, assigned, inProgress, completed, cancelled, invoiced]
        - name: assignedTo
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: needsCostReview
          in: query
          description: >-
            When `true`, returns only orders awaiting cost entry (the admin
            review queue). Admin-only — ignored for non-admin sessions.
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
        - name: sort
          in: query
          schema:
            type: string
            example: -issueDate
      responses:
        '200':
          description: Filtered work-order page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderListResponse'
    post:
      tags: [Work Orders]
      summary: Create a new work order
      operationId: createWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderInput'
      responses:
        '201':
          description: Created work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid work-order input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /work-orders/operators:
    get:
      tags: [Work Orders]
      summary: Return unique operator usernames sorted ascending
      operationId: listOperators
      responses:
        '200':
          description: Sorted operator usernames
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /work-orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return a single work order by id
      operationId: getWorkOrderById
      responses:
        '200':
          description: Matching work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Work Orders]
      summary: Partially update a work order
      operationId: updateWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkOrderInput'
      responses:
        '200':
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid work-order update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Work Orders]
      summary: Delete a work order
      operationId: deleteWorkOrder
      responses:
        '200':
          description: Deletion result, including business failure for unknown ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteWorkOrderResponse'
  /work-orders/{id}/report:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return a PDF work-order report
      operationId: getWorkOrderReport
      responses:
        '200':
          description: PDF report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /work-orders/preview:
    post:
      tags: [Work Orders]
      summary: Render the print HTML for a draft work order (live editor preview)
      description: >-
        Returns the same HTML used to generate the PDF report, for an unsaved
        work order supplied in the body. Nothing is persisted. Used by the editor
        to show a live preview that updates as fields change.
      operationId: previewWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkOrder'
      responses:
        '200':
          description: The rendered print HTML
          content:
            text/html:
              schema:
                type: string
  /work-orders/reserve-number:
    post:
      tags: [Work Orders]
      summary: Reserve the next order number for a new work order
      description: >-
        Atomically claims the next RN-<year>-<seq> order number and records the
        reservation, so it can be shown in the create-form header before the work
        order is saved. Concurrent callers each receive a distinct number. Pass the
        returned orderNumber back in the create request to consume the reservation;
        an abandoned reservation is reclaimed after it expires, leaving only a gap.
      operationId: reserveOrderNumber
      responses:
        '200':
          description: The reserved order number
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservedOrderNumber'
  /work-orders/release-number:
    post:
      tags: [Work Orders]
      summary: Release a reserved order number
      description: >-
        Frees a previously reserved order number when the operator cancels the
        create form, so the number is reclaimed immediately instead of waiting for
        the reservation to expire. Releasing an unknown or already-consumed number
        succeeds as a no-op, so clients can fire-and-forget on form teardown.
      operationId: releaseOrderNumber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [orderNumber]
              properties:
                orderNumber:
                  type: string
                  description: The reserved order number to release.
      responses:
        '204':
          description: The reservation was released (or did not exist).
  /work-orders/{id}/edit-lock:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    post:
      tags: [Work Orders]
      summary: Acquire or refresh the edit lock on a work order
      description: >-
        Claims an exclusive edit lock so only one operator edits a work order at a
        time. The editing client calls this on open and periodically as a heartbeat
        to extend the lock; the lock auto-expires shortly after heartbeats stop
        (e.g. a closed tab). Returns 200 with the caller's lock when acquired or
        refreshed, and 409 with the current holder when another operator is editing.
      operationId: acquireEditLock
      responses:
        '200':
          description: The caller now holds the edit lock.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditLock'
        '409':
          description: Another operator is currently editing this work order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EditLock'
    delete:
      tags: [Work Orders]
      summary: Release the edit lock on a work order
      description: >-
        Frees the caller's edit lock on save, cancel, or close. It is a no-op when
        the caller no longer holds the lock (e.g. it already expired and was taken
        by someone else).
      operationId: releaseEditLock
      responses:
        '204':
          description: The lock was released (or the caller did not hold it).
  /public/work-orders/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return public customer-safe work-order status
      operationId: getPublicWorkOrderStatus
      responses:
        '200':
          description: Public work-order status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWorkOrderStatus'
        '404':
          description: Unknown public token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    IrisSession:
      type: apiKey
      in: cookie
      name: iris_session
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required: [orgSlug, username, password]
      properties:
        orgSlug:
          type: string
          description: Organization (tenant) slug the account belongs to.
          example: grafika-cobanovic
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123
    LoginResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        error:
          type: string
          example: Neispravna organizacija, korisničko ime ili lozinka.
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: string
          example: '1'
        username:
          type: string
          example: admin
        role:
          type: string
          enum: [admin, user]
    CreateUserInput:
      type: object
      required: [username, password, role]
      properties:
        username:
          type: string
        password:
          type: string
          minLength: 6
        role:
          type: string
          enum: [admin, user]
    UpdateUserInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, user]
        password:
          type: string
          description: When non-empty, resets the password (min 6 chars). Empty leaves it unchanged.
    JobDetails:
      type: object
      required: [productCode, paperWeightGsm, dimensions, quantity, finishingNote]
      properties:
        productCode:
          type: [string, 'null']
          example: CAT-42
        paperWeightGsm:
          type: [integer, 'null']
          example: 170
        dimensions:
          type: [string, 'null']
          example: A4
        quantity:
          type: [integer, 'null']
          example: 500
        finishingNote:
          type: [string, 'null']
          example: Mat plastifikacija
    Shipping:
      type: object
      required:
        [deliveryMethod, hasPackaging, hasLabeling, isFragile, requiresSignature, hasInsurance, shippingAddress]
      properties:
        deliveryMethod:
          type: [string, 'null']
          enum: [pickup, postExpress, cityExpress, fieldVisit, null]
          example: postExpress
        hasPackaging:
          type: boolean
        hasLabeling:
          type: boolean
        isFragile:
          type: boolean
        requiresSignature:
          type: boolean
        hasInsurance:
          type: boolean
        shippingAddress:
          type: [string, 'null']
          example: Bulevar 1
    Customer:
      type: object
      required: [id, name, contactName, email, phone, pib, mb, emails, contacts]
      properties:
        id:
          type: string
        name:
          type: string
        contactName:
          type: [string, 'null']
        email:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        emails:
          type: array
          description: >-
            Corporate email addresses for the firm. Replaces the single legacy
            `email` field, which is retained for back-compat.
          items:
            $ref: '#/components/schemas/CustomerEmail'
        contacts:
          type: array
          description: >-
            Contact people at the firm, each with their own optional email and
            phone. Replaces the single legacy `contactName`/`phone` fields.
          items:
            $ref: '#/components/schemas/CustomerContact'
        pib:
          type: [string, 'null']
          description: >-
            Serbian tax identification number (poreski identifikacioni broj):
            9 digits with an ISO 7064 MOD 11,10 control digit. Optional on
            imported records; validated by the server whenever non-empty.
          example: '100197914'
        mb:
          type: [string, 'null']
          description: >-
            Serbian company registration number (matični broj): exactly 8 digits.
            Optional on imported records; validated as format only.
          example: '53671888'
    CustomerEmail:
      type: object
      required: [id, email, label, sortOrder]
      properties:
        id:
          type: string
        email:
          type: string
        label:
          type: [string, 'null']
          description: Optional free-text tag, e.g. "Računovodstvo".
        sortOrder:
          type: integer
    CustomerContact:
      type: object
      required: [id, name, email, phone, role, sortOrder]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: [string, 'null']
        phone:
          type: [string, 'null']
        role:
          type: [string, 'null']
          description: Optional job title or role of the contact person.
        sortOrder:
          type: integer
    Location:
      type: object
      required: [id, customerId, name, address]
      properties:
        id:
          type: string
        customerId:
          type: string
        name:
          type: string
        address:
          type: [string, 'null']
    Assignment:
      type: object
      required: [assignedTo, priority]
      properties:
        assignedTo:
          type: [string, 'null']
        priority:
          type: string
          enum: [low, normal, high, urgent]
    WorkOrderNote:
      type: object
      required: [id, visibility, author, body, createdAt]
      properties:
        id:
          type: string
        visibility:
          type: string
          enum: [internal, customer]
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    WorkOrderEvent:
      type: object
      required: [id, kind, label, actor, createdAt]
      properties:
        id:
          type: string
        kind:
          type: string
        label:
          type: string
        actor:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      required: [id, fileName, fileType, url, uploadedAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        fileType:
          type: string
        url:
          type: [string, 'null']
        uploadedAt:
          type: string
          format: date-time
    InvoiceDraft:
      type: object
      required: [status, invoiceNumber, lineItems, paidAt]
      properties:
        status:
          type: string
          enum: [none, draft, issued, paid]
        invoiceNumber:
          type: [string, 'null']
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        paidAt:
          type: [string, 'null']
          format: date
    InvoiceLineItem:
      type: object
      required: [id, kind, description, quantity, unit, unitPrice]
      properties:
        id:
          type: string
        kind:
          type: string
          enum: [service, goods]
        description:
          type: string
        quantity:
          type: integer
        unit:
          type: string
          description: >-
            Invoice line-item unit of measure. The built-in values are
            `kom`, `m2`, and `set`; administrators may add custom units via the
            `invoiceUnit` managed enum (see GET /enum-values), so any
            non-empty string the server recognizes is accepted.
          example: kom
        unitPrice:
          type: number
          format: double
        unitCost:
          type: [number, 'null']
          format: double
          description: >-
            Per-unit cost frozen onto the line at save time: for catalog lines the
            catalog cost in effect at the issue date (re-snapshot to the completion
            date when the order completes); for ad-hoc lines a value an admin
            enters by hand. Null means the cost is not yet captured (an ad-hoc line
            awaiting admin review, or an item with no known cost) — distinct from a
            genuine 0. Margin = unitPrice - unitCost. Admin-only: returned as null
            to non-admin users.
        catalogItemId:
          type: [string, 'null']
          description: >-
            Links the line back to the CatalogItem the user selected. Null for
            ad-hoc ("special") services typed inline that are not in the catalog.
    CatalogItem:
      type: object
      required: [id, code, name, kind, unit, salePrice, barcode, taxGroup, description, isActive]
      properties:
        id:
          type: string
        code:
          type: string
          description: Stable item code (legacy SIFRA on imported rows).
        name:
          type: string
        kind:
          type: string
          enum: [service, article]
        unit:
          type: string
          description: Unit of measure, lowercased (e.g. kom, set, m2, tab, ris).
          example: kom
        purchasePrice:
          type: [number, 'null']
          format: double
          description: >-
            Cost figure: purchase price (nabavna cena) for articles, cost of
            labor (cena rada) for services. Admin-only — the API returns null
            for non-admin users so operators never see cost or margin data.
        salePrice:
          type: [number, 'null']
          format: double
          description: Sale price charged to the customer (prodajna cena).
        barcode:
          type: [string, 'null']
        taxGroup:
          type: [string, 'null']
        description:
          type: [string, 'null']
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CatalogItemCost:
      type: object
      required: [id, catalogItemId, effectiveFrom, createdAt]
      description: >-
        One effective-dated cost record in a catalog item's price history. A null
        effectiveTo marks the currently-effective record.
      properties:
        id:
          type: string
        catalogItemId:
          type: string
        purchasePrice:
          type: [number, 'null']
          format: double
        salePrice:
          type: [number, 'null']
          format: double
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          type: [string, 'null']
          format: date
        createdAt:
          type: string
          format: date-time
    PDFSections:
      type: object
      description: >-
        Which sections of the work-order printout are rendered. Every field
        defaults to true for an unconfigured shop.
      required: [delivery, billing, notes, shippingAddress, completion, signatures]
      properties:
        delivery:
          type: boolean
          description: The delivery-method / postage checklist box.
        billing:
          type: boolean
          description: The billing-document box (invoice / cash collection / proforma).
        notes:
          type: boolean
          description: The notes section.
        shippingAddress:
          type: boolean
          description: The shipping-address box.
        completion:
          type: boolean
          description: The completion state + date row.
        signatures:
          type: boolean
          description: The issuer / executor signature lines.
    BillingDefaults:
      type: object
      description: >-
        Controls the work-order document type (tip dokumenta): the value new
        orders start with and whether it may be changed per order. Defaults to
        proforma, not overridable, for an unconfigured shop.
      required: [documentType, allowOverride]
      properties:
        documentType:
          type: string
          enum: [invoice, cashCollection, proforma]
          description: The document type new work orders start with.
        allowOverride:
          type: boolean
          description: >-
            When false, clients hide the document-type picker and always use
            documentType.
    PriorityDefaults:
      type: object
      description: >-
        Controls the work-order priority (prioritet): the value new orders start
        with and whether it may be changed per order. Defaults to normal, not
        overridable, for an unconfigured shop.
      required: [priority, allowOverride]
      properties:
        priority:
          type: string
          enum: [low, normal, high, urgent]
          description: The priority new work orders start with.
        allowOverride:
          type: boolean
          description: >-
            When false, clients hide the priority picker and always use priority.
    OrganizationSettings:
      type: object
      required: [firmName, pdfSections, billingDefaults, priorityDefaults, showShippingOptions, allowMultipleLocations]
      properties:
        firmName:
          type: string
          description: The shop's display name shown in the app branding.
          example: Grafika Čobanović
        pdfSections:
          $ref: '#/components/schemas/PDFSections'
        billingDefaults:
          $ref: '#/components/schemas/BillingDefaults'
        priorityDefaults:
          $ref: '#/components/schemas/PriorityDefaults'
        showShippingOptions:
          type: boolean
          description: >-
            Whether the work-order form exposes the extra shipping/handling
            fields (drives-out, wait-for-payment, packaging, labeling, fragile,
            signature, insurance). Off by default.
        allowMultipleLocations:
          type: boolean
          description: >-
            Whether firms may have multiple locations. When false, a firm's
            location is presented as part of the firm (single address, no
            location picker); when true, several locations can be managed. Off
            by default. Purely presentational — locations remain separate rows.
    OrganizationSettingsUpdate:
      type: object
      description: >-
        Partial update for organization settings. Omitted fields are left
        unchanged.
      properties:
        firmName:
          type: string
          description: The shop's display name shown in the app branding.
        pdfSections:
          $ref: '#/components/schemas/PDFSections'
        billingDefaults:
          $ref: '#/components/schemas/BillingDefaults'
        priorityDefaults:
          $ref: '#/components/schemas/PriorityDefaults'
        showShippingOptions:
          type: boolean
          description: Whether the work-order form exposes extra shipping/handling fields.
        allowMultipleLocations:
          type: boolean
          description: Whether firms may have multiple locations (else location shown as part of the firm).
    CatalogItemInput:
      type: object
      required: [name, kind, unit]
      properties:
        code:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [service, article]
        unit:
          type: string
          example: kom
        purchasePrice:
          type: [number, 'null']
          format: double
          description: Cost (nabavna cena / cena rada). Admin-only.
        salePrice:
          type: [number, 'null']
          format: double
          description: Sale price (prodajna cena).
        barcode:
          type: [string, 'null']
        taxGroup:
          type: [string, 'null']
        description:
          type: [string, 'null']
        isActive:
          type: boolean
    CustomerCommunication:
      type: object
      required: [publicToken, notificationEmail, emailNotificationsEnabled, signedBy, signedAt]
      properties:
        publicToken:
          type: string
        notificationEmail:
          type: [string, 'null']
        emailNotificationsEnabled:
          type: boolean
        signedBy:
          type: [string, 'null']
        signedAt:
          type: [string, 'null']
          format: date-time
    WorkOrder:
      type: object
      required:
        [id, orderNumber, customerId, locationId, clientName, contactPerson, jobDescription, jobDetails, billingDocumentType, billingDocumentNumber, shipping, issuedBy, executedBy, assignment, issueDate, proformaDueDate, dueDate, isCompleted, status, price, note, createdAt, updatedAt, completionDate, internalNotes, customerNotes, events, attachments, materialUsage, timeEntries, invoiceDraft, communication]
      properties:
        id:
          type: string
          example: '42'
        orderNumber:
          type: string
          example: RN-2025-00042
        customerId:
          type: [string, 'null']
        locationId:
          type: [string, 'null']
        clientName:
          type: string
          example: Demo Klijent
        contactPerson:
          type: [string, 'null']
          example: Milica
        jobDescription:
          type: string
          example: Štampa kataloga
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
          example: invoice
        billingDocumentNumber:
          type: [string, 'null']
          example: INV-42
        shipping:
          $ref: '#/components/schemas/Shipping'
        issuedBy:
          type: string
          example: admin
        executedBy:
          type: [string, 'null']
          example: pera
        assignment:
          $ref: '#/components/schemas/Assignment'
        issueDate:
          type: string
          format: date
          example: '2025-04-07'
        proformaDueDate:
          type: [string, 'null']
          format: date
          description: Deadline to issue the proforma invoice (predračun).
          example: '2025-04-10'
        dueDate:
          type: [string, 'null']
          format: date
          description: Deadline to finish the job.
          example: '2025-04-14'
        isCompleted:
          type: boolean
        status:
          type: string
          enum: [new, assigned, inProgress, completed, cancelled, invoiced]
          example: inProgress
        price:
          type: [number, 'null']
          format: double
          example: 12000.5
        profit:
          type: [number, 'null']
          format: double
          description: >-
            Cached margin (sum of (unitPrice - unitCost) * quantity over line
            items with a captured cost), recomputed on every save. Provisional
            while needsCostReview is true. Admin-only — omitted/null for non-admin
            users.
          example: 4200
        needsCostReview:
          type: boolean
          description: >-
            True when any line item has no captured cost (unitCost null) — usually
            ad-hoc lines an operator added. Such orders are not blocked: they save,
            raise a cost_review event, and appear in the admin review queue
            (GET /work-orders?needsCostReview=true) until an admin enters the
            missing costs. Admin-only — returned false to non-admin users.
          example: false
        note:
          type: [string, 'null']
          example: Hitno
        createdAt:
          type: string
          format: date-time
          example: '2025-04-01T10:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-04-02T10:00:00Z'
        completionDate:
          type: [string, 'null']
          format: date
          example: '2025-04-05'
        internalNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        customerNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        events:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderEvent'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        materialUsage:
          type: array
          items:
            type: object
        timeEntries:
          type: array
          items:
            type: object
        invoiceDraft:
          $ref: '#/components/schemas/InvoiceDraft'
        communication:
          $ref: '#/components/schemas/CustomerCommunication'
    WorkOrderListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrder'
        total:
          type: integer
          minimum: 0
    CustomerListResponse:
      type: object
