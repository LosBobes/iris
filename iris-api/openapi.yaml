openapi: 3.1.0
info:
  title: Iris Operations API
  version: 0.3.0
  description: |
    Shared HTTP API for Iris work-order operations. Production runtime persists
    data in SQLite, while fixture-backed data remains available for development
    and automated tests.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Auth
  - name: Customers
  - name: Work Orders
paths:
  /healthz:
    get:
      tags: [System]
      summary: Return backend readiness status
      operationId: healthz
      responses:
        '200':
          description: Backend is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a desktop user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /auth/session:
    get:
      tags: [Auth]
      summary: Return the current cookie-backed session
      operationId: getCurrentSession
      responses:
        '200':
          description: Current session result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
  /auth/logout:
    post:
      tags: [Auth]
      summary: Clear the current session
      operationId: logout
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
  /customers:
    get:
      tags: [Customers]
      summary: Return normalized customers for work-order entry
      operationId: listCustomers
      responses:
        '200':
          description: Customer records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
  /locations:
    get:
      tags: [Customers]
      summary: Return normalized customer locations
      operationId: listLocations
      responses:
        '200':
          description: Customer location records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
  /work-orders:
    get:
      tags: [Work Orders]
      summary: Return filtered and paginated work orders
      operationId: listWorkOrders
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [new, assigned, inProgress, waitingForCustomer, waitingForMaterials, completed, cancelled, invoiced]
        - name: assignedTo
          in: query
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 0
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
        - name: sort
          in: query
          schema:
            type: string
            example: -issueDate
      responses:
        '200':
          description: Filtered work-order page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrderListResponse'
    post:
      tags: [Work Orders]
      summary: Create a new work order
      operationId: createWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderInput'
      responses:
        '201':
          description: Created work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid work-order input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /work-orders/operators:
    get:
      tags: [Work Orders]
      summary: Return unique operator usernames sorted ascending
      operationId: listOperators
      responses:
        '200':
          description: Sorted operator usernames
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /work-orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return a single work order by id
      operationId: getWorkOrderById
      responses:
        '200':
          description: Matching work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Work Orders]
      summary: Partially update a work order
      operationId: updateWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkOrderInput'
      responses:
        '200':
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid work-order update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Work Orders]
      summary: Delete a work order
      operationId: deleteWorkOrder
      responses:
        '200':
          description: Deletion result, including business failure for unknown ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteWorkOrderResponse'
  /work-orders/{id}/report:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return a PDF work-order report
      operationId: getWorkOrderReport
      responses:
        '200':
          description: PDF report
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /public/work-orders/{token}:
    parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return public customer-safe work-order status
      operationId: getPublicWorkOrderStatus
      responses:
        '200':
          description: Public work-order status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicWorkOrderStatus'
        '404':
          description: Unknown public token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    IrisSession:
      type: apiKey
      in: cookie
      name: iris_session
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123
    LoginResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        error:
          type: string
          example: Neispravno korisničko ime ili lozinka.
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: string
          example: '1'
        username:
          type: string
          example: admin
        role:
          type: string
          enum: [admin, user]
    JobDetails:
      type: object
      required: [productCode, paperWeightGsm, dimensions, quantity, finishingNote]
      properties:
        productCode:
          type: [string, 'null']
          example: CAT-42
        paperWeightGsm:
          type: [integer, 'null']
          example: 170
        dimensions:
          type: [string, 'null']
          example: A4
        quantity:
          type: [integer, 'null']
          example: 500
        finishingNote:
          type: [string, 'null']
          example: Mat plastifikacija
    Shipping:
      type: object
      required:
        [deliveryMethod, hasPackaging, hasLabeling, isFragile, requiresSignature, hasInsurance, shippingAddress]
      properties:
        deliveryMethod:
          type: [string, 'null']
          enum: [pickup, postExpress, cityExpress, fieldVisit, null]
          example: postExpress
        hasPackaging:
          type: boolean
        hasLabeling:
          type: boolean
        isFragile:
          type: boolean
        requiresSignature:
          type: boolean
        hasInsurance:
          type: boolean
        shippingAddress:
          type: [string, 'null']
          example: Bulevar 1
    Customer:
      type: object
      required: [id, name, contactName, email, phone]
      properties:
        id:
          type: string
        name:
          type: string
        contactName:
          type: [string, 'null']
        email:
          type: [string, 'null']
        phone:
          type: [string, 'null']
    Location:
      type: object
      required: [id, customerId, name, address]
      properties:
        id:
          type: string
        customerId:
          type: string
        name:
          type: string
        address:
          type: [string, 'null']
    Assignment:
      type: object
      required: [assignedTo, priority, scheduledDate]
      properties:
        assignedTo:
          type: [string, 'null']
        priority:
          type: string
          enum: [low, normal, high, urgent]
        scheduledDate:
          type: [string, 'null']
          format: date
    WorkOrderNote:
      type: object
      required: [id, visibility, author, body, createdAt]
      properties:
        id:
          type: string
        visibility:
          type: string
          enum: [internal, customer]
        author:
          type: string
        body:
          type: string
        createdAt:
          type: string
          format: date-time
    WorkOrderEvent:
      type: object
      required: [id, kind, label, actor, createdAt]
      properties:
        id:
          type: string
        kind:
          type: string
        label:
          type: string
        actor:
          type: string
        createdAt:
          type: string
          format: date-time
    Attachment:
      type: object
      required: [id, fileName, fileType, url, uploadedAt]
      properties:
        id:
          type: string
        fileName:
          type: string
        fileType:
          type: string
        url:
          type: [string, 'null']
        uploadedAt:
          type: string
          format: date-time
    InvoiceDraft:
      type: object
      required: [status, invoiceNumber, lineItems, paidAt]
      properties:
        status:
          type: string
          enum: [none, draft, issued, paid]
        invoiceNumber:
          type: [string, 'null']
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/InvoiceLineItem'
        paidAt:
          type: [string, 'null']
          format: date
    InvoiceLineItem:
      type: object
      required: [id, description, quantity, unitPrice]
      properties:
        id:
          type: string
        description:
          type: string
        quantity:
          type: integer
        unitPrice:
          type: number
          format: double
    CustomerCommunication:
      type: object
      required: [publicToken, notificationEmail, emailNotificationsEnabled, signedBy, signedAt]
      properties:
        publicToken:
          type: string
        notificationEmail:
          type: [string, 'null']
        emailNotificationsEnabled:
          type: boolean
        signedBy:
          type: [string, 'null']
        signedAt:
          type: [string, 'null']
          format: date-time
    WorkOrder:
      type: object
      required:
        [id, orderNumber, customerId, locationId, clientName, contactPerson, jobDescription, jobDetails, billingDocumentType, billingDocumentNumber, shipping, issuedBy, executedBy, assignment, issueDate, dueDate, isCompleted, status, price, note, createdAt, updatedAt, completionDate, internalNotes, customerNotes, events, attachments, materialUsage, timeEntries, invoiceDraft, communication]
      properties:
        id:
          type: string
          example: '42'
        orderNumber:
          type: string
          example: RN-2025-0042
        customerId:
          type: [string, 'null']
        locationId:
          type: [string, 'null']
        clientName:
          type: string
          example: Demo Klijent
        contactPerson:
          type: [string, 'null']
          example: Milica
        jobDescription:
          type: string
          example: Štampa kataloga
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
          example: invoice
        billingDocumentNumber:
          type: [string, 'null']
          example: INV-42
        shipping:
          $ref: '#/components/schemas/Shipping'
        issuedBy:
          type: string
          example: admin
        executedBy:
          type: [string, 'null']
          example: pera
        assignment:
          $ref: '#/components/schemas/Assignment'
        issueDate:
          type: string
          format: date
          example: '2025-04-07'
        dueDate:
          type: [string, 'null']
          format: date
          example: '2025-04-14'
        isCompleted:
          type: boolean
        status:
          type: string
          enum: [new, assigned, inProgress, waitingForCustomer, waitingForMaterials, completed, cancelled, invoiced]
          example: inProgress
        price:
          type: [number, 'null']
          format: double
          example: 12000.5
        note:
          type: [string, 'null']
          example: Hitno
        createdAt:
          type: string
          format: date-time
          example: '2025-04-01T10:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-04-02T10:00:00Z'
        completionDate:
          type: [string, 'null']
          format: date
          example: '2025-04-05'
        internalNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        customerNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        events:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderEvent'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        materialUsage:
          type: array
          items:
            type: object
        timeEntries:
          type: array
          items:
            type: object
        invoiceDraft:
          $ref: '#/components/schemas/InvoiceDraft'
        communication:
          $ref: '#/components/schemas/CustomerCommunication'
    WorkOrderListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrder'
        total:
          type: integer
          minimum: 0
    CreateWorkOrderInput:
      type: object
      required:
        [customerId, locationId, clientName, contactPerson, jobDescription, jobDetails, billingDocumentType, billingDocumentNumber, shipping, assignment, issuedBy, issueDate, dueDate, price, note, internalNotes, customerNotes, attachments, materialUsage, timeEntries, invoiceDraft, communication]
      properties:
        customerId:
          type: [string, 'null']
        locationId:
          type: [string, 'null']
        clientName:
          type: string
        contactPerson:
          type: [string, 'null']
        jobDescription:
          type: string
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
        billingDocumentNumber:
          type: [string, 'null']
        shipping:
          $ref: '#/components/schemas/Shipping'
        assignment:
          $ref: '#/components/schemas/Assignment'
        issuedBy:
          type: string
        issueDate:
          type: string
          format: date
        dueDate:
          type: [string, 'null']
          format: date
        price:
          type: [number, 'null']
          format: double
        note:
          type: [string, 'null']
        internalNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        customerNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        materialUsage:
          type: array
          items:
            type: object
        timeEntries:
          type: array
          items:
            type: object
        invoiceDraft:
          $ref: '#/components/schemas/InvoiceDraft'
        communication:
          $ref: '#/components/schemas/CustomerCommunication'
    UpdateWorkOrderInput:
      type: object
      properties:
        customerId:
          type: [string, 'null']
        locationId:
          type: [string, 'null']
        clientName:
          type: string
        contactPerson:
          type: [string, 'null']
        jobDescription:
          type: string
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
        billingDocumentNumber:
          type: [string, 'null']
        shipping:
          $ref: '#/components/schemas/Shipping'
        assignment:
          $ref: '#/components/schemas/Assignment'
        issuedBy:
          type: string
        executedBy:
          type: [string, 'null']
        issueDate:
          type: string
          format: date
        dueDate:
          type: [string, 'null']
          format: date
        isCompleted:
          type: boolean
        status:
          type: string
          enum: [new, assigned, inProgress, waitingForCustomer, waitingForMaterials, completed, cancelled, invoiced]
        price:
          type: [number, 'null']
          format: double
        note:
          type: [string, 'null']
        completionDate:
          type: [string, 'null']
          format: date
        internalNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        customerNotes:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderNote'
        events:
          type: array
          items:
            $ref: '#/components/schemas/WorkOrderEvent'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
        materialUsage:
          type: array
          items:
            type: object
        timeEntries:
          type: array
          items:
            type: object
        invoiceDraft:
          $ref: '#/components/schemas/InvoiceDraft'
        communication:
          $ref: '#/components/schemas/CustomerCommunication'
    PublicWorkOrderStatus:
      type: object
      required:
        [orderNumber, clientName, jobDescription, status, dueDate, customerNoteCount, internalNoteCount, signedBy, signedAt]
      properties:
        orderNumber:
          type: string
        clientName:
          type: string
        jobDescription:
          type: string
        status:
          type: string
          enum: [new, assigned, inProgress, waitingForCustomer, waitingForMaterials, completed, cancelled, invoiced]
        dueDate:
          type: [string, 'null']
          format: date
        customerNoteCount:
          type: integer
        internalNoteCount:
          type: integer
        signedBy:
          type: [string, 'null']
        signedAt:
          type: [string, 'null']
          format: date-time
    DeleteWorkOrderResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Radni nalog nije pronađen.
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
