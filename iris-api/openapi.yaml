openapi: 3.1.0
info:
  title: Iris Desktop Support API
  version: 0.2.0
  description: |
    HTTP API that mirrors the full work-order workflow used by the Electron desktop application.
    The desktop app talks to Electron IPC, and Electron main forwards those requests to this REST API.
servers:
  - url: http://localhost:8080
tags:
  - name: System
  - name: Auth
  - name: Work Orders
paths:
  /healthz:
    get:
      tags: [System]
      summary: Return backend readiness status
      operationId: healthz
      responses:
        '200':
          description: Backend is reachable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate a desktop user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /work-orders:
    get:
      tags: [Work Orders]
      summary: Return all work orders needed by the desktop application
      operationId: listWorkOrders
      responses:
        '200':
          description: Ordered collection of work orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkOrder'
    post:
      tags: [Work Orders]
      summary: Create a new work order
      operationId: createWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkOrderInput'
      responses:
        '201':
          description: Created work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid work-order input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /work-orders/operators:
    get:
      tags: [Work Orders]
      summary: Return unique operator usernames sorted ascending
      operationId: listOperators
      responses:
        '200':
          description: Sorted operator usernames
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /work-orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
    get:
      tags: [Work Orders]
      summary: Return a single work order by id
      operationId: getWorkOrderById
      responses:
        '200':
          description: Matching work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags: [Work Orders]
      summary: Partially update a work order
      operationId: updateWorkOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkOrderInput'
      responses:
        '200':
          description: Updated work order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkOrder'
        '400':
          description: Invalid JSON payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Unknown work-order id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Invalid work-order update
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags: [Work Orders]
      summary: Delete a work order
      operationId: deleteWorkOrder
      responses:
        '200':
          description: Deletion result, including business failure for unknown ids
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteWorkOrderResponse'
components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: admin123
    LoginResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        error:
          type: string
          example: Neispravno korisničko ime ili lozinka.
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, username, role]
      properties:
        id:
          type: string
          example: '1'
        username:
          type: string
          example: admin
        role:
          type: string
          enum: [admin, user]
    JobDetails:
      type: object
      required: [productCode, paperWeightGsm, dimensions, quantity, finishingNote]
      properties:
        productCode:
          type: [string, 'null']
          example: CAT-42
        paperWeightGsm:
          type: [integer, 'null']
          example: 170
        dimensions:
          type: [string, 'null']
          example: A4
        quantity:
          type: [integer, 'null']
          example: 500
        finishingNote:
          type: [string, 'null']
          example: Mat plastifikacija
    Shipping:
      type: object
      required:
        [deliveryMethod, hasPackaging, hasLabeling, isFragile, requiresSignature, hasInsurance, shippingAddress]
      properties:
        deliveryMethod:
          type: [string, 'null']
          enum: [pickup, postExpress, cityExpress, fieldVisit, null]
          example: postExpress
        hasPackaging:
          type: boolean
        hasLabeling:
          type: boolean
        isFragile:
          type: boolean
        requiresSignature:
          type: boolean
        hasInsurance:
          type: boolean
        shippingAddress:
          type: [string, 'null']
          example: Bulevar 1
    WorkOrder:
      type: object
      required:
        [id, orderNumber, clientName, contactPerson, jobDescription, jobDetails, billingDocumentType, billingDocumentNumber, shipping, issuedBy, executedBy, issueDate, dueDate, isCompleted, status, price, note, createdAt, updatedAt, completionDate]
      properties:
        id:
          type: string
          example: '42'
        orderNumber:
          type: string
          example: RN-2025-0042
        clientName:
          type: string
          example: Demo Klijent
        contactPerson:
          type: [string, 'null']
          example: Milica
        jobDescription:
          type: string
          example: Štampa kataloga
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
          example: invoice
        billingDocumentNumber:
          type: [string, 'null']
          example: INV-42
        shipping:
          $ref: '#/components/schemas/Shipping'
        issuedBy:
          type: string
          example: admin
        executedBy:
          type: [string, 'null']
          example: pera
        issueDate:
          type: string
          format: date
          example: '2025-04-07'
        dueDate:
          type: [string, 'null']
          format: date
          example: '2025-04-14'
        isCompleted:
          type: boolean
        status:
          type: string
          enum: [draft, active, completed, cancelled]
          example: completed
        price:
          type: [integer, 'null']
          example: 12000
        note:
          type: [string, 'null']
          example: Hitno
        createdAt:
          type: string
          format: date-time
          example: '2025-04-01T10:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2025-04-02T10:00:00Z'
        completionDate:
          type: [string, 'null']
          format: date
          example: '2025-04-05'
    CreateWorkOrderInput:
      type: object
      required:
        [clientName, contactPerson, jobDescription, jobDetails, billingDocumentType, billingDocumentNumber, shipping, issuedBy, issueDate, dueDate, price, note]
      properties:
        clientName:
          type: string
        contactPerson:
          type: [string, 'null']
        jobDescription:
          type: string
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
        billingDocumentNumber:
          type: [string, 'null']
        shipping:
          $ref: '#/components/schemas/Shipping'
        issuedBy:
          type: string
        issueDate:
          type: string
          format: date
        dueDate:
          type: [string, 'null']
          format: date
        price:
          type: [integer, 'null']
        note:
          type: [string, 'null']
    UpdateWorkOrderInput:
      type: object
      properties:
        clientName:
          type: string
        contactPerson:
          type: [string, 'null']
        jobDescription:
          type: string
        jobDetails:
          anyOf:
            - $ref: '#/components/schemas/JobDetails'
            - type: 'null'
        billingDocumentType:
          type: [string, 'null']
          enum: [invoice, cashCollection, proforma, null]
        billingDocumentNumber:
          type: [string, 'null']
        shipping:
          $ref: '#/components/schemas/Shipping'
        issuedBy:
          type: string
        executedBy:
          type: [string, 'null']
        issueDate:
          type: string
          format: date
        dueDate:
          type: [string, 'null']
          format: date
        isCompleted:
          type: boolean
        status:
          type: string
          enum: [draft, active, completed, cancelled]
        price:
          type: [integer, 'null']
        note:
          type: [string, 'null']
        completionDate:
          type: [string, 'null']
          format: date
    DeleteWorkOrderResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string
          example: Radni nalog nije pronađen.
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string