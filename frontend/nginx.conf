server {
    listen 80;

    # Serve the built SPA and fall back to index.html for client-side routes.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy API calls to the backend so the browser sees one origin.
    #
    # The Go router serves its routes at the root (/auth/..., /healthz,
    # /public/..., /work-orders, etc.) with no /api prefix. The trailing slash
    # on proxy_pass below strips the /api/ prefix before forwarding, so a
    # browser request to /api/auth/login reaches the backend as /auth/login.
    # The frontend is built with VITE_IRIS_API_BASE_URL=/api to match.
    # "backend" is the compose service name.
    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
